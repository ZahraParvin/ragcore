version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - chroma_data:/app/backend/chroma_db
    restart: unless-stopped

  streamlit:
    image: python:3.11-slim
    working_dir: /app
    command: >
      sh -c "pip install -q streamlit requests &&
             streamlit run frontend/streamlit_app.py --server.port 8501 --server.address 0.0.0.0"
    ports:
      - "8501:8501"
    environment:
      - RAGCORE_API_URL=http://api:8000
    volumes:
      - .:/app
    depends_on:
      - api
    restart: unless-stopped

volumes:
  chroma_data:
